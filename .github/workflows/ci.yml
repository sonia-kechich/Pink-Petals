name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs lint + typecheck + tests + build. Lint is non-blocking on legacy
      # warnings (see eslint.config.js) but fails on any error.
      - name: Check (lint + typecheck + test + build)
        run: npm run check
